<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comprobante de Pago</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .comprobante { background: white; padding: 20px; border: 1px solid #ddd; width: 100%; max-width: 500px; }
        .header { background: #0d47a1; color: white; padding: 15px; text-align: center; }
        .total-box { background: #e8f5e9; padding: 15px; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="result"></div>

<script>
    function searchInvoice() {
        // ... (Tu lógica de búsqueda) ...
        
        // Cálculo seguro del total
        const total = parseFloat(invoice['TOTAL A PAGAR FACTURA'] || 0);

        resultDiv.innerHTML = `
        <div id="printArea" class="comprobante">
            <div class="header"><h3>Comprobante de Pago</h3></div>
            <p><strong>Casa:</strong> ${invoice['CASA']}</p>
            <p><strong>Titular:</strong> ${invoice['NOMBRE DEL TITULAR DE LA VIVIENDA']}</p>
            <p><strong>N° Remarcador:</strong> ${invoice['N° REMARCADOR']}</p>
            <div class="total-box">
                <p>TOTAL A PAGAR</p>
                <div style="font-size: 24px;">$${total.toLocaleString('es-CL')}</div>
            </div>
        </div>
        <button id="btnDescarga" onclick="descargarPDF()">Descargar PDF</button>`;
    }

    function descargarPDF() {
        const btn = document.getElementById('btnDescarga');
        btn.style.display = 'none'; // Ocultamos el botón para que no salga en el PDF

        const element = document.getElementById('printArea');
        const opt = {
            margin: 10,
            filename: 'Comprobante.pdf',
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            btn.style.display = 'block'; // Volvemos a mostrar el botón tras generar
        });
    }
</script>
</body>
</html>
