<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barrio Transitorio 13 de Mayo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
    background:#eef2f7;
    margin:0;
    padding:30px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 25px rgba(0,0,0,.1);
}
h1{
    text-align:center;
    color:#0d47a1;
    margin-bottom:5px;
}
.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}
select,input,button{
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    background:#0d47a1;
    color:white;
    cursor:pointer;
}
button:hover{background:#08306b;}
#result{margin-top:25px;}
table{
    width:100%;
    border-collapse:collapse;
}
td{
    padding:10px;
    border-bottom:1px solid #ddd;
}
.comprobante{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}
.header{
    background:#0d47a1;
    color:white;
    padding:20px;
    text-align:center;
}
.total{
    background:#e8f5e9;
    text-align:center;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}
.total-monto{
    font-size:36px;
    color:#2e7d32;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h1>Barrio Transitorio 13 de Mayo</h1>
<p class="subtitle">Consulta de Facturas de Agua y Gastos Comunes</p>

<label>Mes y Año:</label>
<select id="monthSelector" onchange="loadSelectedMonth()">
<option value="">Seleccionar...</option>
<option value="facturas_2026_04.xlsx">Abril2026</option>
<option value="facturas_2026_03.xlsx">Marzo2026</option>
<option value="facturas_2026_02.xlsx">Febrero2026</option>
<option value="facturas_2026_01.xlsx">Enero2026</option>
<option value="facturas_2025_12.xlsx">Diciembre2025</option>
<option value="facturas_2025_11.xlsx">Noviembre2025</option>
<option value="facturas_2025_10.xlsx">Octubre2025</option>
<option value="facturas_2025_09.xlsx">Septiembre2025</option>
</select>

<br><br>

<label>Número de Casa:</label>
<input type="number" id="houseNumber">
<button onclick="searchInvoice()">Buscar</button>

<div id="result"></div>
</div>

<script>
let invoices=[];
let selectedMonthFile='';

async function loadSelectedMonth(){
    const selector=document.getElementById('monthSelector');
    selectedMonthFile=selector.value;

    if(!selectedMonthFile){ invoices=[]; return; }

    try{
        const response=await fetch(selectedMonthFile);
        const data=await response.arrayBuffer();

        const workbook=XLSX.read(data,{type:'array'});
        const sheet=workbook.Sheets[workbook.SheetNames[0]];
        const jsonData=XLSX.utils.sheet_to_json(sheet,{defval:""});

        invoices=jsonData.map(row=>{
            const normalized={};
            for(const key in row){
                normalized[key.trim().toUpperCase()]=row[key];
            }
            return normalized;
        });

    }catch(error){
        document.getElementById('result').innerHTML='Error al cargar archivo.';
    }
}

function parseNumber(value){
    if(typeof value==="string"){
        return parseFloat(value.replace(/[^0-9.-]+/g,''))||0;
    }
    return parseFloat(value)||0;
}

function formatCurrency(value){
    return new Intl.NumberFormat('es-CL',{
        style:'currency',
        currency:'CLP'
    }).format(value||0);
}

function searchInvoice(){

    const houseNumber=document.getElementById('houseNumber').value;
    const resultDiv=document.getElementById('result');

    const invoice=invoices.find(row=>row['CASA']==houseNumber);

    if(!invoice){
        resultDiv.innerHTML='No se encontró información.';
        return;
    }

    const lecturaAnterior=parseNumber(invoice['LECTURA ANTERIOR']);
    const lecturaActual=parseNumber(invoice['LECTURA ACTUAL']);
    const consumoAgua=lecturaActual-lecturaAnterior;
    const valorM3=parseNumber(invoice['VALOR DE M3']);
    const subtotal=parseNumber(invoice['SUBTOTAL']);
    const consumoGeneral=parseNumber(invoice['CONSUMO GENERAL']);
    const gastoComun=parseNumber(invoice['GASTO COMUN']);
    const totalPagar=subtotal+consumoGeneral+gastoComun;

    resultDiv.innerHTML=`
    <div class="comprobante">

        <div class="header">
            <h2>BARRIO TRANSITORIO 13 DE MAYO</h2>
            <p>Comprobante de Cobro</p>
        </div>

        <div style="padding:25px;">

        <table>
            <tr><td><strong>Casa</strong></td><td>${invoice['CASA']}</td></tr>
            <tr><td><strong>Titular</strong></td><td>${invoice['NOMBRE DEL TITULAR DE LA VIVIENDA']}</td></tr>
            <tr><td><strong>N° Remarcador</strong></td><td>${invoice['N° REMARCADOR']}</td></tr>
            <tr><td><strong>Lectura Anterior</strong></td><td>${lecturaAnterior}</td></tr>
            <tr><td><strong>Lectura Actual</strong></td><td>${lecturaActual}</td></tr>
            <tr><td><strong>Consumo Agua M³</strong></td><td>${consumoAgua.toFixed(2)}</td></tr>
            <tr><td><strong>Valor M³</strong></td><td>${formatCurrency(valorM3)}</td></tr>
            <tr><td><strong>Subtotal</strong></td><td>${formatCurrency(subtotal)}</td></tr>
            <tr><td><strong>Consumo General</strong></td><td>${formatCurrency(consumoGeneral)}</td></tr>
            <tr><td><strong>Gasto Común</strong></td><td>${formatCurrency(gastoComun)}</td></tr>
        </table>

        <div class="total">
            <div>TOTAL A PAGAR</div>
            <div class="total-monto">${formatCurrency(totalPagar)}</div>
        </div>

        </div>
    </div>`;
}
</script>

</body>
</html>
