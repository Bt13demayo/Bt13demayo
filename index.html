<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Factura de Agua</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

label{
    font-weight:bold;
}

select,input,button{
    padding:10px;
    margin:5px;
}

button{
    cursor:pointer;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:#004c99;
}

#result{
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

table,th,td{
    border:1px solid #ddd;
}

th,td{
    padding:10px;
}

th{
    background:#f0f0f0;
}

.estado{
    font-size:20px;
    font-weight:bold;
    text-align:center;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

.pagado{
    background:#d4edda;
    color:#155724;
}

.porpagar{
    background:#fff3cd;
    color:#856404;
}

.vencido{
    background:#f8d7da;
    color:#721c24;
}

</style>
</head>
<body>

<div class="container">

<h1>Consulta de Factura de Agua</h1>

<p>Seleccione el mes y luego ingrese el número de casa.</p>

<label>Mes y Año:</label>

<select id="monthSelector" onchange="loadSelectedMonth()">

<option value="">Seleccionar...</option>

<option value="GS_ABRIL_2026">Abril 2026</option>

<option value="facturas_2026_03.xlsx">Marzo 2026</option>
<option value="facturas_2026_02.xlsx">Febrero 2026</option>
<option value="facturas_2026_01.xlsx">Enero 2026</option>

<option value="facturas_2025_12.xlsx">Diciembre 2025</option>
<option value="facturas_2025_11.xlsx">Noviembre 2025</option>
<option value="facturas_2025_10.xlsx">Octubre 2025</option>
<option value="facturas_2025_09.xlsx">Septiembre 2025</option>
<option value="facturas_2025_08.xlsx">Agosto 2025</option>
<option value="facturas_2025_07.xlsx">Julio 2025</option>
<option value="facturas_2025_06.xlsx">Junio 2025</option>
<option value="facturas_2025_05.xlsx">Mayo 2025</option>

<option value="facturas_2025_04.xlsx">Abril 2025</option>
<option value="facturas_2025_03.xlsx">Marzo 2025</option>
<option value="facturas_2025_02.xlsx">Febrero 2025</option>
<option value="facturas_2025_01.xlsx">Enero 2025</option>

<option value="facturas_2024_12.xlsx">Diciembre 2024</option>
<option value="facturas_2024_11.xlsx">Noviembre 2024</option>

</select>

<br>

<label>Número de Casa:</label>
<input type="number" id="houseNumber">

<button onclick="searchInvoice()">
Buscar
</button>

<div id="result"></div>

</div>

<script>

let invoices = [];
let selectedMonthFile = '';

async function loadSelectedMonth(){

    selectedMonthFile =
        document.getElementById('monthSelector').value;

    invoices = [];

    if(!selectedMonthFile){
        return;
    }

    try{

        if(selectedMonthFile === 'GS_ABRIL_2026'){

            const url =
            'https://docs.google.com/spreadsheets/d/e/2PACX-1vR-Yp_HqhoN8Ax-pQVKdVyxL7ywJXjink1tlfZQB0xul9hH3VN8ICB8Vw27qJfOynIxYmBA87zXPyYz/pub?output=csv';

            const response = await fetch(url);

            const text = await response.text();

            const rows = text.trim().split('\n');

            const headers =
            rows[0]
            .split(',')
            .map(h => h.trim().replace(/"/g,'').toUpperCase());

            invoices = rows.slice(1).map(row => {

                const values = row.split(',');

                let obj = {};

                headers.forEach((header,index)=>{
                    obj[header] =
                    values[index]
                    ? values[index].replace(/"/g,'').trim()
                    : '';
                });

                return obj;

            });

            return;
        }

        const response =
        await fetch(selectedMonthFile);

        const data =
        await response.arrayBuffer();

        const workbook =
        XLSX.read(data,{type:'array'});

        const sheet =
        workbook.Sheets[
        workbook.SheetNames[0]
        ];

        const jsonData =
        XLSX.utils.sheet_to_json(sheet);

        invoices = jsonData.map(row=>{

            let normalized={};

            for(const key in row){

                normalized[
                key.trim().toUpperCase()
                ] = row[key];

            }

            return normalized;

        });

    }

    catch(error){

        console.error(error);

        alert(
        'Error al cargar datos'
        );

    }

}

function parseNumber(value){

    if(!value) return 0;

    return parseFloat(
        String(value)
        .replace(/[^0-9.-]+/g,'')
    ) || 0;

}

function formatCurrency(value){

    return new Intl.NumberFormat(
        'es-CL',
        {
            style:'currency',
            currency:'CLP'
        }
    ).format(value);

}

function searchInvoice(){

    const house =
    document.getElementById(
    'houseNumber'
    ).value;

    const result =
    document.getElementById(
    'result'
    );

    result.innerHTML='';

    if(!house){

        result.innerHTML =
        'Ingrese un número de casa';

        return;
    }

    const invoice =
    invoices.find(
    x => String(x['CASA']) === String(house)
    );

    if(!invoice){

        result.innerHTML =
        'No se encontró información';

        return;
    }

    const estado =
    (invoice['ESTADO'] || '')
    .toUpperCase();

    let estadoHTML='';

    if(estado==='PAGADO'){

        estadoHTML=
        '<div class="estado pagado">🟢 PAGADO</div>';

    }
    else if(estado==='VENCIDO'){

        estadoHTML=
        '<div class="estado vencido">🔴 VENCIDO</div>';

    }
    else{

        estadoHTML=
        '<div class="estado porpagar">🟡 POR PAGAR</div>';

    }

    result.innerHTML = `

        ${estadoHTML}

        <h2>Factura Casa ${invoice['CASA']}</h2>

        <table>

            <tr>
                <th>Campo</th>
                <th>Valor</th>
            </tr>

            <tr>
                <td>Casa</td>
                <td>${invoice['CASA']}</td>
            </tr>

            <tr>
                <td>Titular</td>
                <td>${invoice['NOMBRE DEL TITULAR DE LA VIVIENDA']}</td>
            </tr>

            <tr>
                <td>N° Remarcador</td>
                <td>${invoice['N° REMARCADOR']}</td>
            </tr>

            <tr>
                <td>Lectura Anterior</td>
                <td>${invoice['LECTURA ANTERIOR']}</td>
            </tr>

            <tr>
                <td>Lectura Actual</td>
                <td>${invoice['LECTURA ACTUAL']}</td>
            </tr>

            <tr>
                <td>Consumo Agua M3</td>
                <td>${invoice['CONSUMO DE AGUA M3']}</td>
            </tr>

            <tr>
                <td>Valor M3</td>
                <td>${formatCurrency(parseNumber(invoice['VALOR DE M3']))}</td>
            </tr>

            <tr>
                <td>Subtotal</td>
                <td>${formatCurrency(parseNumber(invoice['SUBTOTAL']))}</td>
            </tr>

            <tr>
                <td>Consumo General</td>
                <td>${formatCurrency(parseNumber(invoice['CONSUMO GENERAL']))}</td>
            </tr>

            <tr>
                <td>Gasto Común</td>
                <td>${formatCurrency(parseNumber(invoice['GASTO COMUN']))}</td>
            </tr>

            <tr>
                <td><strong>Total a Pagar</strong></td>
                <td><strong>${formatCurrency(parseNumber(invoice['TOTAL A PAGAR']))}</strong></td>
            </tr>

            <tr>
                <td><strong>Estado</strong></td>
                <td><strong>${estado}</strong></td>
            </tr>

        </table>

    `;

}

</script>

</body>
</html>
