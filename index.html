<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barrio Transitorio 13 de Mayo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; background: #eef2f7; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,.1); box-sizing: border-box; }
        h1 { text-align: center; color: #0d47a1; margin-bottom: 5px; font-size: 22px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        select, input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #0d47a1; color: white; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #08306b; }
        button:disabled { background: #9fa8da; cursor: not-allowed; }
        #statusMessage { text-align: center; color: #0d47a1; font-weight: bold; margin: 5px 0; font-size: 14px; }
        #result { margin-top: 25px; }
        
        /* OPTIMIZACIÓN TABLA MÓVIL */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 15px; vertical-align: top; word-wrap: break-word; overflow-wrap: break-word; }
        td:first-child { width: 40%; } /* Columna etiquetas */
        td:last-child { width: 60%; text-align: right; } /* Columna datos alineados a la derecha */
        
        .comprobante { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; padding: 15px; box-sizing: border-box; }
        .header { background: #0d47a1; color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 15px; }
        .header h3 { margin: 0; font-size: 18px; }
        .total { background: #e8f5e9; text-align: center; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .total-monto { font-size: 28px; color: #2e7d32; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Barrio Transitorio 13 de Mayo</h1>
    <p class="subtitle">Consulta de Facturas</p>

    <label>Seleccionar Mes:</label>
    <select id="monthSelector" onchange="loadSelectedMonth()">
        <option value="">Seleccionar...</option>
        <option value="facturas_2026_06.xlsx">Junio 2026</option>
        <option value="facturas_2026_05.xlsx">Mayo 2026</option>
        <option value="facturas_2026_04.xlsx">Abril 2026</option>
        <option value="facturas_2026_03.xlsx">Marzo 2026</option>
        <option value="facturas_2026_02.xlsx">Febrero 2026</option>
        <option value="facturas_2026_01.xlsx">Enero 2026</option>
        <option value="facturas_2025_12.xlsx">Diciembre 2025</option>
        <option value="facturas_2025_11.xlsx">Noviembre 2025</option>
        <option value="facturas_2025_10.xlsx">Octubre 2025</option>
        <option value="facturas_2025_09.xlsx">Septiembre 2025</option>
        <option value="facturas_2025_08.xlsx">Agosto 2025</option>
        <option value="facturas_2025_07.xlsx">Julio 2025</option>
        <option value="facturas_2025_06.xlsx">Junio 2025</option>
        <option value="facturas_2025_05.xlsx">Mayo 2025</option>
        <option value="facturas_2025_04.xlsx">Abril 2025</option>
        <option value="facturas_2025_03.xlsx">Marzo 2025</option>
        <option value="facturas_2025_02.xlsx">Febrero 2025</option>
        <option value="facturas_2025_01.xlsx">Enero 2025</option>
        <option value="facturas_2024_12.xlsx">Diciembre 2024</option>
        <option value="facturas_2024_11.xlsx">Noviembre 2024</option>
    </select>

    <div id="statusMessage"></div>

    <label>Número de Casa:</label>
    <input type="number" id="houseNumber" placeholder="Ej: 13" disabled>
    <button id="searchBtn" onclick="searchInvoice()" disabled>Buscar Comprobante</button>

    <div id="result"></div>
</div>

<script>
    let invoices = [];

    async function loadSelectedMonth() {
        const file = document.getElementById('monthSelector').value;
        const statusMessage = document.getElementById('statusMessage');
        const houseInput = document.getElementById('houseNumber');
        const searchBtn = document.getElementById('searchBtn');
        const resultDiv = document.getElementById('result');

        if (!file) {
            invoices = [];
            houseInput.disabled = true;
            searchBtn.disabled = true;
            statusMessage.innerText = "";
            resultDiv.innerHTML = "";
            return;
        }

        try {
            statusMessage.innerText = "Cargando datos del mes...";
            houseInput.disabled = true;
            searchBtn.disabled = true;
            resultDiv.innerHTML = "";

            const response = await fetch(file);
            if (!response.ok) throw new Error("No se pudo encontrar el archivo.");
            
            const data = await response.arrayBuffer();
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, {defval: 0});
            
            invoices = jsonData.map(row => {
                const normalized = {};
                for(const key in row) normalized[key.trim().toUpperCase()] = row[key];
                return normalized;
            });

            statusMessage.innerText = "¡Datos cargados con éxito!";
            houseInput.disabled = false;
            searchBtn.disabled = false;
        } catch(e) { 
            statusMessage.innerText = "";
            alert("Error al cargar el archivo. Asegúrate de que existe en la ruta correcta."); 
            console.error(e);
        }
    }

    function parseNumber(value) {
        if (typeof value === 'number') return value;
        if (typeof value === 'string') return parseFloat(value.replace(/[^0-9.-]+/g, '')) || 0;
        return 0;
    }

    function formatCleanDisplayNumber(value) {
        const num = parseNumber(value);
        return Number.isInteger(num) ? num : parseFloat(num.toFixed(2));
    }

    function formatCurrency(val) {
        return new Intl.NumberFormat('es-CL', {style: 'currency', currency: 'CLP'}).format(val || 0);
    }

    function searchInvoice() {
        const houseNumber = document.getElementById('houseNumber').value;
        const resultDiv = document.getElementById('result');

        if (!houseNumber) { alert("Por favor, ingresa un número de casa."); return; }

        const invoice = invoices.find(row => String(row['CASA']) == String(houseNumber));

        if (!invoice) { resultDiv.innerHTML = '<p style="color:red; text-align:center;">No se encontró información para esa casa.</p>'; return; }

        const consumoM3 = parseNumber(invoice['CONSUMO DE AGUA M3']);
        const valorM3 = parseNumber(invoice['VALOR DE M3']);
        const subtotalCalculado = consumoM3 * valorM3;
        const gastoComun = parseNumber(invoice['GASTO COMUN']);
        const consumoGral = parseNumber(invoice['CONSUMO GENERAL']);
        const saldoAnt = parseNumber(invoice['SALDO ANTERIOR']);
        const totalFinal = subtotalCalculado + gastoComun + consumoGral + saldoAnt;

        resultDiv.innerHTML = `
        <div class="comprobante">
            <div class="header"><h3>Comprobante de Pago</h3></div>
            <div style="padding:5px 0;">
                <table>
                    <tr><td><strong>Casa</strong></td><td>${invoice['CASA'] || ''}</td></tr>
                    <tr><td><strong>Titular</strong></td><td>${invoice['NOMBRE DEL TITULAR DE LA VIVIENDA'] || 'No registrado'}</td></tr>
                    <tr><td><strong>N° Remarcador</strong></td><td>${invoice['N° REMARCADOR'] || 'N/A'}</td></tr>
                    <tr><td><strong>Lectura Ant.</strong></td><td>${formatCleanDisplayNumber(invoice['LECTURA ANTERIOR'])}</td></tr>
                    <tr><td><strong>Lectura Act.</strong></td><td>${formatCleanDisplayNumber(invoice['LECTURA ACTUAL'])}</td></tr>
                    <tr><td><strong>Consumo M³</strong></td><td>${formatCleanDisplayNumber(consumoM3)}</td></tr>
                    <tr><td><strong>Valor M³</strong></td><td>${formatCurrency(valorM3)}</td></tr>
                    <tr><td><strong>Consumo Gral.</strong></td><td>${formatCurrency(consumoGral)}</td></tr>
                    <tr><td><strong>Gasto Común</strong></td><td>${formatCurrency(gastoComun)}</td></tr>
                    <tr><td><strong>Saldo Ant.</strong></td><td>${formatCurrency(saldoAnt)}</td></tr>
                </table>
                <div class="total">
                    <div>TOTAL A PAGAR</div>
                    <div class="total-monto">${formatCurrency(totalFinal)}</div>
                </div>
            </div>
        </div>`;
    }
</script>
</body>
</html>
