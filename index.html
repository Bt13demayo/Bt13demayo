<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Barrio Transitorio 13 de Mayo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f7; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,.1); }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #0d47a1; color: white; font-weight: bold; border: none; cursor: pointer; }
        .comprobante { background: white; border: 1px solid #ddd; padding: 20px; margin-top: 20px; border-radius: 10px; }
        .header { background: #0d47a1; color: white; padding: 15px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .total { background: #e8f5e9; text-align: center; padding: 15px; margin-top: 20px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Barrio Transitorio 13 de Mayo</h1>
    
    <label>Seleccionar Mes:</label>
    <select id="monthSelector" onchange="loadSelectedMonth()">
        <option value="">Seleccionar...</option>
        <!-- Meses 2026 -->
        <option value="facturas_2026_06.xlsx">Junio 2026</option>
        <option value="facturas_2026_05.xlsx">Mayo 2026</option>
        <option value="facturas_2026_04.xlsx">Abril 2026</option>
        <option value="facturas_2026_03.xlsx">Marzo 2026</option>
        <option value="facturas_2026_02.xlsx">Febrero 2026</option>
        <option value="facturas_2026_01.xlsx">Enero 2026</option>
        <!-- Meses 2025 -->
        <option value="facturas_2025_12.xlsx">Diciembre 2025</option>
        <option value="facturas_2025_11.xlsx">Noviembre 2025</option>
        <option value="facturas_2025_10.xlsx">Octubre 2025</option>
        <option value="facturas_2025_09.xlsx">Septiembre 2025</option>
        <option value="facturas_2025_08.xlsx">Agosto 2025</option>
        <option value="facturas_2025_07.xlsx">Julio 2025</option>
        <option value="facturas_2025_06.xlsx">Junio 2025</option>
        <option value="facturas_2025_05.xlsx">Mayo 2025</option>
        <option value="facturas_2025_04.xlsx">Abril 2025</option>
        <option value="facturas_2025_03.xlsx">Marzo 2025</option>
        <option value="facturas_2025_02.xlsx">Febrero 2025</option>
        <option value="facturas_2025_01.xlsx">Enero 2025</option>
    </select>

    <label>Número de Casa:</label>
    <input type="number" id="houseNumber" placeholder="Ej: 72">
    <button onclick="searchInvoice()">Buscar Comprobante</button>

    <div id="result"></div>
</div>

<script>
    let invoices = [];

    async function loadSelectedMonth() {
        const file = document.getElementById('monthSelector').value;
        if (!file) return;
        try {
            const response = await fetch(file);
            const data = await response.arrayBuffer();
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            invoices = XLSX.utils.sheet_to_json(sheet).map(row => {
                const cleanRow = {};
                for(let key in row) cleanRow[key.trim().toUpperCase()] = row[key];
                return cleanRow;
            });
        } catch(e) { alert("Archivo no encontrado."); }
    }

    function searchInvoice() {
        const house = document.getElementById('houseNumber').value;
        const inv = invoices.find(r => String(r['CASA']) == String(house));
        
        if (!inv) { alert("No se encontró la casa."); return; }

        // Función para limpiar valores y asegurar que sean números[cite: 1]
        const p = (v) => parseFloat(String(v).replace(/[^0-9.-]+/g, '')) || 0;

        // Cálculo manual del total para garantizar precisión[cite: 1]
        const total = (p(inv['CONSUMO DE AGUA M3']) * p(inv['VALOR DE M3'])) + 
                      p(inv['CONSUMO GENERAL']) + 
                      p(inv['GASTO COMUN']) + 
                      p(inv['SALDO ANTERIOR']);

        const fmt = (v) => new Intl.NumberFormat('es-CL', {style: 'currency', currency: 'CLP'}).format(v);

        document.getElementById('result').innerHTML = `
        <div class="comprobante">
            <div class="header"><h3>Comprobante de Pago</h3></div>
            <table>
                <tr><td>Casa:</td><td>${inv['CASA']}</td></tr>
                <tr><td>Titular:</td><td>${inv['NOMBRE DEL TITULAR DE LA VIVIENDA']}</td></tr>
                <tr><td>Remarcador:</td><td>${inv['N° REMARCADOR']}</td></tr>
                <tr><td>Consumo M3:</td><td>${inv['CONSUMO DE AGUA M3']}</td></tr>
                <tr><td>Valor M3:</td><td>${fmt(p(inv['VALOR DE M3']))}</td></tr>
                <tr><td>Gasto Común:</td><td>${fmt(p(inv['GASTO COMUN']))}</td></tr>
            </table>
            <div class="total">TOTAL A PAGAR: ${fmt(total)}</div>
        </div>
        <p style="text-align:center; margin-top:20px;">Presiona <strong>Ctrl + P</strong> para imprimir.</p>`;
    }
</script>
</body>
</html>
