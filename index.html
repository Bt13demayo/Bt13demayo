<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Factura de Agua</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; display: inline-block; }
        .pagado { background-color: #d4edda; color: #155724; }
        .por-pagar { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Consulta de Factura de Agua</h1>
    <p>Selecciona el mes y año de la factura, e introduce el número de casa:</p>
    
    <label for="monthSelector">Mes y Año:</label>
    <select id="monthSelector" onchange="loadSelectedMonth()">
        <option value="">Seleccionar...</option>
        
        <option value="https://docs.google.com/spreadsheets/d/1u5BEKYFIN_Uxmd4TXe2g0S3wLtM7a68uIqgoz63H-SQ/edit?gid=1357639760#gid=1357639760" data-tipo="google_excel">Abril 2026 (En vivo)</option>
        
        <option value="facturas_2026_03.xlsx" data-tipo="local">Marzo 2026</option>
        <option value="facturas_2026_02.xlsx" data-tipo="local">Febrero 2026</option>
        <option value="facturas_2026_01.xlsx" data-tipo="local">Enero 2026</option>
        <option value="facturas_2025_12.xlsx" data-tipo="local">Diciembre 2025</option>
        <option value="facturas_2025_11.xlsx" data-tipo="local">Noviembre 2025</option>
        <option value="facturas_2025_10.xlsx" data-tipo="local">Octubre 2025</option>
        <option value="facturas_2025_09.xlsx" data-tipo="local">Septiembre 2025</option>
        <option value="facturas_2025_08.xlsx" data-tipo="local">Agosto 2025</option>
        <option value="facturas_2025_07.xlsx" data-tipo="local">Julio 2025</option>
        <option value="facturas_2025_06.xlsx" data-tipo="local">Junio 2025</option>
        <option value="facturas_2025_05.xlsx" data-tipo="local">Mayo 2025</option>
        <option value="facturas_2025_04.xlsx" data-tipo="local">Abril 2025</option>
        <option value="facturas_2025_03.xlsx" data-tipo="local">Marzo 2025</option>
        <option value="facturas_2025_02.xlsx" data-tipo="local">Febrero 2025</option>
        <option value="facturas_2025_01.xlsx" data-tipo="local">Enero 2025</option>
        <option value="facturas_2024_12.xlsx" data-tipo="local">Diciembre 2024</option>
        <option value="facturas_2024_11.xlsx" data-tipo="local">Noviembre 2024</option>
    </select>

    <br><br>

    <label for="houseNumber">Número de Casa:</label>
    <input type="number" id="houseNumber" />
    <button onclick="searchInvoice()">Buscar</button>

    <div id="result"></div>

    <script>
        let invoices = [];
        let selectedMonthFile = '';
        let tipoOrigen = '';

        // Limpiador numérico estricto y adaptativo
        function cleanNumber(val) {
            if (val === undefined || val === null || val === "") return 0;
            if (typeof val === 'number') return val;

            let s = val.toString().replace(/[\$\s\u00A0]/g, '');
            if (s.includes('.') && s.includes(',')) {
                s = s.replace(/\./g, '').replace(',', '.');
            } else if (s.includes(',')) {
                s = s.replace(/,/g, '.');
            }
            
            let num = parseFloat(s);
            return isNaN(num) ? 0 : num;
        }

        async function loadSelectedMonth() {
            const selector = document.getElementById('monthSelector');
            const selectedOption = selector.options[selector.selectedIndex];
            selectedMonthFile = selector.value;
            tipoOrigen = selectedOption.getAttribute('data-tipo');

            if (!selectedMonthFile) {
                document.getElementById('result').textContent = 'Por favor, selecciona un mes.';
                invoices = [];
                return;
            }

            document.getElementById('result').textContent = 'Conectando con Google Drive...';

            try {
                let url = selectedMonthFile;
                
                // Hack para transformar tu link de edición directo en un flujo binario descargable
                if (tipoOrigen === 'google_excel' && url.includes('docs.google.com/spreadsheets')) {
                    let fileId = url.split('/d/')[1].split('/')[0];
                    url = `https://docs.google.com/spreadsheets/d/${fileId}/export?format=xlsx`;
                }

                const response = await fetch(url);
                if (!response.ok) throw new Error();

                const data = await response.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "0" });

                invoices = jsonData.map(row => {
                    const normalizedRow = {};
                    for (const key in row) {
                        normalizedRow[key.trim().toUpperCase()] = row[key];
                    }
                    return normalizedRow;
                });

                document.getElementById('result').textContent = 'Datos en vivo cargados con éxito. Introduce tu número de casa.';
            } catch (error) {
                document.getElementById('result').textContent = 'Error al leer el archivo en vivo. Asegúrate de que el archivo en Drive esté compartido como "Cualquier persona con el enlace puede ver".';
                invoices = [];
            }
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(Math.round(value));
        }

        function searchInvoice() {
            const houseNumber = document.getElementById('houseNumber').value;
            const resultDiv = document.getElementById('result');

            if (!houseNumber || !selectedMonthFile) {
                resultDiv.textContent = 'Por favor, selecciona un mes e introduce un número de casa.';
                return;
            }

            const invoice = invoices.find(row => row['CASA'] == houseNumber);

            if (invoice) {
                let lecturaAnterior = cleanNumber(invoice['LECTURA ANTERIOR']);
                let lecturaActual = cleanNumber(invoice['LECTURA ACTUAL']);
                
                if (lecturaAnterior > 50000) lecturaAnterior = lecturaAnterior / 1000;
                if (lecturaActual > 50000) lecturaActual = lecturaActual / 1000;
                
                const consumoAgua = lecturaActual - lecturaAnterior;
                const valorM3 = cleanNumber(invoice['VALOR DE M3']);
                const subtotal = consumoAgua * valorM3;
                
                const consumoGeneral = cleanNumber(invoice['CONSUMO GENERAL']);
                const gastoComun = cleanNumber(invoice['GASTO COMUN']);
                const totalPagar = subtotal + consumoGeneral + gastoComun;
                
                const estadoExcel = (invoice['ESTADO'] || 'Por pagar').trim().toUpperCase();
                const esPagado = estadoExcel === 'PAGADO';
                const claseEstado = esPagado ? 'pagado' : 'por-pagar';
                const textoEstado = esPagado ? 'PAGADO' : 'POR PAGAR';

                resultDiv.innerHTML = `
                    <h2>Factura para la Casa ${houseNumber}</h2>
                    <table>
                        <tr><th>Campo</th><th>Valor</th></tr>
                        <tr><td>ESTADO DE LA FACTURA</td><td><span class="badge ${claseEstado}">${textoEstado}</span></td></tr>
                        <tr><td>CASA</td><td>${invoice['CASA']}</td></tr>
                        <tr><td>NOMBRE DEL TITULAR DE LA VIVIENDA</td><td>${invoice['NOMBRE DEL TITULAR DE LA VIVIENDA'] || 'No disponible'}</td></tr>
                        <tr><td>N° REMARCADOR</td><td>${invoice['N° REMARCADOR'] || 'No disponible'}</td></tr>
                        <tr><td>LECTURA ANTERIOR</td><td>${lecturaAnterior.toFixed(3)}</td></tr>
                        <tr><td>LECTURA ACTUAL</td><td>${lecturaActual.toFixed(3)}</td></tr>
                        <tr><td>CONSUMO DE AGUA M3</td><td>${consumoAgua.toFixed(3)}</td></tr>
                        <tr><td>VALOR DE M3</td><td>${formatCurrency(valorM3)}</td></tr>
                        <tr><td>SUBTOTAL</td><td>${formatCurrency(subtotal)}</td></tr>
                        <tr><td>CONSUMO GENERAL</td><td>${formatCurrency(consumoGeneral)}</td></tr>
                        <tr><td>GASTO COMUN</td><td>${formatCurrency(gastoComun)}</td></tr>
                        <tr><td>TOTAL A PAGAR</td><td>${formatCurrency(totalPagar)}</td></tr>
                    </table>
                `;
            } else {
                resultDiv.textContent = `No se encontró información para la casa ${houseNumber}.`;
            }
        }
    </script>
</body>
</html>
